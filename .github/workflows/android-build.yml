name: Android Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 34
        build-tools: 34.0.0
        components: platform-tools,platforms;android-34,build-tools;34.0.0

    - name: List directory contents
      run: ls -la

    - name: List app directory contents
      run: ls -la app/

    - name: List app/src directory contents
      run: ls -la app/src/

    - name: List app/src/main directory contents
      run: ls -la app/src/main/

    - name: List gradle directory contents
      run: ls -la gradle/

    - name: List gradle/wrapper directory contents
      run: ls -la gradle/wrapper/ || echo "Directory not found"

    - name: Create gradle/wrapper directory if not exists
      run: mkdir -p gradle/wrapper

    - name: Download Gradle 8.2
      run: |
        wget -O gradle.zip https://services.gradle.org/distributions/gradle-8.2-bin.zip
        unzip gradle.zip
        mv gradle-8.2 gradle-bin

    - name: List Gradle directory after download
      run: ls -la gradle-bin/

    - name: Make Gradle executable
      run: chmod +x gradle-bin/bin/gradle

    - name: Gradle version check
      run: gradle-bin/bin/gradle --version

    - name: Clean build
      run: gradle-bin/bin/gradle clean --no-daemon

    - name: Build Android app
      run: gradle-bin/bin/gradle assembleRelease --no-daemon --stacktrace --info

    - name: Check if APK was generated
      run: |
        ls -la app/build/outputs/apk/
        ls -la app/build/outputs/apk/release/ || echo "APK directory not found"

    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: app-release
        path: app/build/outputs/apk/release/app-release-unsigned.apk
        if-no-files-found: warn
