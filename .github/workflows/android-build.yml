name: Android Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y unzip wget

    - name: Download Gradle
      run: |
        wget -O gradle.zip https://services.gradle.org/distributions/gradle-8.2-bin.zip
        unzip gradle.zip
        mv gradle-8.2 gradle

    - name: List directory contents after Gradle download
      run: ls -la

    - name: List Gradle directory contents
      run: ls -la gradle/

    - name: Build Android app
      run: ./gradle/bin/gradle clean assembleRelease --no-daemon --stacktrace --info

    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: app-release
        path: app/build/outputs/apk/release/app-release-unsigned.apk
