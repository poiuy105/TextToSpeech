name: Android Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 34
        build-tools: 34.0.0

    - name: List directory contents
      run: ls -la

    - name: List app directory contents
      run: ls -la app/

    - name: List gradle directory contents
      run: ls -la gradle/

    - name: List gradle/wrapper directory contents
      run: ls -la gradle/wrapper/ || echo "Directory not found"

    - name: Create gradle/wrapper directory if not exists
      run: mkdir -p gradle/wrapper

    - name: Download Gradle 8.2
      run: |
        wget -O gradle.zip https://services.gradle.org/distributions/gradle-8.2-bin.zip
        unzip gradle.zip
        mv gradle-8.2 gradle

    - name: List Gradle directory after download
      run: ls -la gradle/

    - name: Build Android app using downloaded Gradle
      run: ./gradle/bin/gradle clean assembleRelease --no-daemon --stacktrace

    - name: Check if APK was generated
      run: ls -la app/build/outputs/apk/release/ || echo "APK directory not found"

    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: app-release
        path: app/build/outputs/apk/release/app-release-unsigned.apk
