name: Android Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Download Gradle
      run: |
        wget -O gradle.zip https://services.gradle.org/distributions/gradle-7.6.3-bin.zip
        unzip gradle.zip
        mv gradle-7.6.3 gradle

    - name: List directory contents
      run: ls -la

    - name: List app directory contents
      run: ls -la app/

    - name: List app/src directory contents
      run: ls -la app/src/

    - name: List app/src/main directory contents
      run: ls -la app/src/main/

    - name: Build with Gradle
      run: ./gradle/bin/gradle assembleRelease --no-daemon --stacktrace --info

    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: app-release
        path: app/build/outputs/apk/release/app-release-unsigned.apk
